controllers:
  main:
    replicas: 1
    type: deployment

    containers:
      main:
        image:
          repository: "ghcr.io/jjgadgets/phanpy"
          tag: 2025.01.26.24f03f5
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 512Mi
        env:
          PHANPY_WEBSITE: "phanpy.alexbissessur.dev"
          PHANPY_DEFAULT_INSTANCE: "gts.alexbissessur.dev"

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

ingress:
  main:
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/target: bo0tzz.me
    hosts:
      - host: phanpy.bo0.tz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
    tls:
      - hosts:
          - phanpy.bo0.tz
        secretName: phanpy-web-tls
