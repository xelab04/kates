apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ghostroute
spec:
  entryPoints:
  - websecure
  - web
  routes:
  - kind: Rule
    match: Host(`alexbissessur.dev`) && PathPrefix(`/rss`)
    services:
    - name: ghost-svc
      namespace: ghost
      port: 80

  - kind: Rule
    match: Host(`alexbissessur.dev`) && (PathPrefix(`/.well-known/webfinger`) || PathPrefix(`/.well-known/host-meta`) || PathPrefix(`/.well-known/nodeinfo`))
    services:
    - name: mastodon
      namespace: mastodon
      port: 8080

  - kind: Rule
    match: Host(`alexbissessur.dev`)
    services:
    - name: anubis-alex
      port: 3000
  tls:
    certResolver: le
