apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: continuwuity
  namespace: argocd
spec:
  destination:
    namespace: continuwuity
    server: https://kubernetes.default.svc
  project: default
  source:
    path: manifests/continuwuity
    repoURL: https://github.com/xelab04/kates.git
    targetRevision: HEAD
  syncPolicy:
    automated: {}
